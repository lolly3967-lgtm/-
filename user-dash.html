<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة الأفراد | لا تهدرها</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
        }

        .map-layout {
            display: flex;
        }

        .side-panel {
            width: 340px;
            background: white;
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .btn-back-small {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            background: #e67e22;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .offer-card {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .offer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            color: white;
        }

        .sale { background: #2d5a3f; }
        .new-badge { background: #ff7a00; } /* لون برتقالي للعروض المضافة حديثاً */

        .btn-action {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: #2d5a3f;
            color: white;
            cursor: pointer;
        }

        .btn-action:hover {
            background: #1b4332;
        }

        #map-user {
            flex: 1;
            height: 100vh;
        }

        .cart-box {
            background: #f4f7f6;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        #dynamic-offers-container {
            border-top: 2px dashed #ddd;
            margin-top: 20px;
            padding-top: 20px;
        }
    </style>
</head>

<body>

<div class="map-layout">

    <div class="side-panel">

        <a href="login.html" class="btn-back-small">🏠 خروج</a>

        <h3>🍽️ العروض المتاحة</h3>

        <div class="cart-box">
            🛒 سلة الطلبات: <span id="cart-count">0</span>
        </div>

        <div class="offer-card" onclick="focusMap(21.4858, 39.1925)">
            <span class="badge sale">خصم 50%</span>
            <h4>كافيه حي الشاطئ</h4>
            <p>15 ريال</p>
            <button class="btn-action" onclick="order(event, 'كافيه حي الشاطئ')">طلب الآن</button>
        </div>

        <div class="offer-card" onclick="focusMap(21.52, 39.16)">
            <span class="badge sale">خصم 30%</span>
            <h4>مطعم البيك</h4>
            <p>20 ريال</p>
            <button class="btn-action" onclick="order(event, 'مطعم البيك')">طلب الآن</button>
        </div>

        <div id="dynamic-offers-container">
            <h4 style="color: #666; font-size: 14px; margin-bottom: 15px;">✨ عروض مضافة حديثاً:</h4>
            </div>

    </div>

    <div id="map-user"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // إعداد الخريطة
    var map = L.map('map-user').setView([21.4858, 39.1925], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // إضافة ماركر ثابت للتجربة
    L.marker([21.4858, 39.1925]).addTo(map).bindPopup("كافيه حي الشاطئ");

    let cart = 0;

    function focusMap(lat, lng) {
        map.setView([lat, lng], 15);
    }

    function order(e, name) {
        e.stopPropagation();
        cart++;
        document.getElementById("cart-count").innerText = cart;
        alert("✅ تم إضافة الطلب من: " + name);
    }

    // --- الكود الجديد لربط البيانات ---
    window.onload = function() {
        // 1. جلب البيانات من ذاكرة المتصفح
        let foodData = JSON.parse(localStorage.getItem('food')) || [];
        let dynamicContainer = document.getElementById('dynamic-offers-container');

        if (foodData.length === 0) {
            dynamicContainer.innerHTML += "<p style='font-size:12px; color:999;'>لا توجد عروض جديدة حالياً</p>";
        }

        // 2. تكرار البيانات وإنشاء بطاقة لكل وجبة مضافة
        foodData.forEach((item, index) => {
            let cardHtml = `
                <div class="offer-card" style="border-right: 4px solid #ff7a00;">
                    <span class="badge new-badge">جديد من المطعم</span>
                    <h4>${item.name}</h4>
                    <p>${item.price} ريال</p>
                    <button class="btn-action" style="background:#ff7a00;" onclick="order(event, '${item.name}')">
                        طلب الآن
                    </button>
                </div>
            `;
            dynamicContainer.innerHTML += cardHtml;
        });
    };
</script>

</body>
</html>
