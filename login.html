<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لا تهدرها</title>

    <!-- خط -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --orange: #ff7a00;
            --green: #2e7d32;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(to left, #f8f8f8, #ffffff);
        }

        .top-bar {
            padding: 15px;
        }

        .btn-back {
            text-decoration: none;
            background: var(--orange);
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
        }

        .login-container {
            width: 90%;
            max-width: 450px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .input-box {
            width: 100%;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .login-btn {
            width: 100%;
            background: var(--orange);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .user-selection {
            display: grid;
            gap: 10px;
        }

        .user-box {
            display: block;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            text-decoration: none;
            color: black;
            transition: 0.2s;
        }

        .user-box:hover {
            background: #eee;
        }

        .user-box span {
            font-size: 24px;
        }

    </style>
</head>

<body>

<div class="top-bar">
    <a href="index.html" class="btn-back">⬅️ العودة للرئيسية</a>
</div>

<div class="login-container">

    <h2>مرحباً بك 👋</h2>
    <p>سجّل دخولك للوصول إلى لوحة التحكم</p>

    <!-- فورم -->
    <div class="input-box">
        <input type="email" placeholder="البريد الإلكتروني">
    </div>

    <div class="input-box">
        <input type="password" placeholder="كلمة المرور">
    </div>

    <button class="login-btn">تسجيل الدخول</button>

    <hr style="margin:20px 0;">

    <p>أو اختر نوع الحساب مباشرة</p>

    <!-- اختيار سريع -->
    <div class="user-selection">
      <a href="restaurant-dash.html" class="user-box">🏪 مطعم / كافيه</a>
      <a href="charity-dash.html" class="user-box">🤝 جمعية خيرية</a>
      <a href="user-dash.html" class="user-box">👤 مستخدم</a>
  </div>

</div>

</body>
</html>
