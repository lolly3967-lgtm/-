<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لا تهدرها</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --orange: #ff7a00;
            --green: #2e7d32;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(to left, #f8f8f8, #ffffff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 15px;
        }

        .btn-back {
            text-decoration: none;
            background: var(--orange);
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 14px;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-back:hover {
            opacity: 0.9;
            transform: translateX(-5px);
        }

        .login-container {
            width: 90%;
            max-width: 420px; /* تحديد عرض مثالي للابتوب */
            margin: 20px auto; /* تقليل المارجن ليتناسب مع الجوال */
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            text-align: center;
            box-sizing: border-box; /* لضمان عدم خروج الحواف عن العرض المحدد */
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .input-box {
            width: 100%;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box; /* مهم جداً للتجاوب */
            font-family: 'Tajawal', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 5px rgba(255, 122, 0, 0.2);
        }

        .login-btn {
            width: 100%;
            background: var(--orange);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #e66e00;
        }

        .user-selection {
            display: grid;
            grid-template-columns: 1fr; /* جعل العناصر تحت بعضها */
            gap: 12px;
        }

        .user-box {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 12px;
            text-decoration: none;
            color: #444;
            transition: 0.3s;
            font-weight: 500;
        }

        .user-box:hover {
            background: #fff3e6;
            border-color: var(--orange);
            color: var(--orange);
        }

        /* --- تعديلات الشاشات الصغيرة (الجوال) --- */
        @media (max-width: 480px) {
            .login-container {
                padding: 20px;
                margin-top: 10px;
            }
            
            h2 { font-size: 20px; }
            
            .user-box {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<div class="top-bar">
    <a href="index.html" class="btn-back">⬅️ العودة للرئيسية</a>
</div>

<div class="login-container">

    <h2>مرحباً بك 👋</h2>
    <p>سجّل دخولك للوصول إلى لوحة التحكم</p>

    <div class="input-box">
        <input type="email" placeholder="البريد الإلكتروني" required>
    </div>

    <div class="input-box">
        <input type="password" placeholder="كلمة المرور" required>
    </div>

    <button class="login-btn">تسجيل الدخول</button>

    <div style="display: flex; align-items: center; margin: 10px 0 25px;">
        <hr style="flex: 1; border: 0; border-top: 1px solid #eee;">
        <span style="padding: 0 10px; color: #999; font-size: 12px;">أو اختر نوع الحساب</span>
        <hr style="flex: 1; border: 0; border-top: 1px solid #eee;">
    </div>

    <div class="user-selection">
      <a href="restaurant-dash.html" class="user-box">🏪 مطعم / كافيه</a>
      <a href="charity-dash.html" class="user-box">🤝 جمعية خيرية</a>
      <a href="user-dash.html" class="user-box">👤 مستخدم</a>
  </div>

</div>

</body>
</html>
